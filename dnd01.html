<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .ball {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: #e65454;
        }
    </style>
    <title>簡單的拖曳操作範例</title>
</head>

<body>
    <div class="ball" draggable="true"></div>

    <script>
        const ball = document.querySelector(".ball");

        ball.addEventListener("dragstart", (evn) => {
            console.log("dragstart");
            evn.dataTransfer.setData("text/plain", "這是圓形");
        });
    </script>
</body>

</html>
