<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        #dragArea {
            width: 200px;
            height: 200px;
            border: 2px dashed #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #dropArea {
            width: 200px;
            height: 200px;
            border: 2px solid blue;
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
    </style>
    <title>簡單的拖曳操作範例 3</title>
</head>

<body>
    <div id="dragArea">
        <img src="https://sagedaben.com/iSpan/images/100x100.png" draggable="true" id="draggableImage">
    </div>
    <div id="dropArea">
        拖到這裡來
    </div>

    <script>
        const img = document.querySelector("#draggableImage");
        const dropArea = document.querySelector("#dropArea");

        img.addEventListener("dragstart", e => {
            e.dataTransfer.setData("text/plain", e.target.id);
            e.target.style.opacity = 0;
        });

        img.addEventListener("dragend", e => e.target.style.opacity = 1);

        dropArea.addEventListener("dragover", e => e.preventDefault());
        dropArea.addEventListener("drop", e => {
            e.preventDefault();
            const id = e.dataTransfer.getData("text");
            const dropedElement = document.querySelector(`#${id}`);
            e.target.append(dropedElement);
        });
    </script>
</body>

</html>
