<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <style>
    #map {
      height: 500px;
    }
  </style>
  <title>Geolocation API 04</title>
</head>

<body>
  <div class="container my-3">
    <h1>在地圖上標記多個地點</h1>
  </div>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    // https://storage.googleapis.com/article01-uploads/html5API/datas.csv
    const mapElm = document.querySelector("#map");
    const map = L.map(mapElm).setView([23.6978, 120.9605], 9);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    let locations;
    // const locations = [
    //   { lat: 25.057191, lon: 121.507961, name: '大稻埕碼頭廣場' },
    //   { lat: 25.057169, lon: 121.507955, name: '大稻埕碼頭廣場' },
    //   { lat: 25.057146, lon: 121.507954, name: '大稻埕碼頭廣場' },
    //   { lat: 25.055755, lon: 121.507636, name: '自行車租借站旁' },
    //   { lat: 25.055755, lon: 121.507608, name: '自行車租借站旁' }
    // ];

    fetch("datas.csv").then((res) => {
      return res.text();
    }).then((data) => {
      console.log(data);
      const lines = data.trim().split("\n");
      locations = lines.slice(1);
      console.log(locations);


    }).catch(() => {

    });

    // getGeolocation();

    function getGeolocation() {
      if (!navigator.geolocation) {
        // 沒支援
        output.innerHTML = "沒支援"
        return;
      }
      // 有支援
      navigator.geolocation.getCurrentPosition(
        (position) => {
          map.setView([locations[0].lat, locations[0].lon], 19);
          locations.forEach(location => {
            L.marker([location.lat, location.lon])
              .addTo(map)
              .bindPopup(`你的位置：<br>緯度：${location.lat}<br>經度：${location.lon}<br>`)
              .openPopup();
          });

        },
        (error) => {
          switch (error.code) {
            case error.PERMISSION_DENIED:
              output.textContent = '使用者拒絕提供位置資訊。';
              break;
            case error.POSITION_UNAVAILABLE:
              output.textContent = '無法取得位置資訊。';
              break;
            case error.TIMEOUT:
              output.textContent = '取得位置資訊逾時。';
              break;
            default:
              output.textContent = '發生未知錯誤。';
          }
        }
      );
    }
  </script>
</body>

</html>
