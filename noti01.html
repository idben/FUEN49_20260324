<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Notification API</title>
</head>

<body>
    <div class="container py-5" style="max-width: 600px;">
        <h1 class="mb-4">Notification API 範例</h1>

        <div class="mb-4">
            <p>目前通知權限狀態：<span id="permissionStatus" class="badge bg-secondary"></span></p>
        </div>

        <div class="d-flex gap-2 mb-4">
            <button id="btnRequestPermission" class="btn btn-primary">請求通知權限</button>
            <button id="btnSendNotification" class="btn btn-success">發送通知</button>
        </div>

        <div id="messageArea"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script>
        const permissionStatus = document.querySelector("#permissionStatus");
        const messageArea = document.querySelector("#messageArea");
        const btnRequestPermission = document.querySelector("#btnRequestPermission");
        const btnSendNotification = document.querySelector("#btnSendNotification");

        btnSendNotification.addEventListener("click", sendNotification);

        btnRequestPermission.addEventListener("click", () => {
            Notification.requestPermission().then((result) => {
                console.log(result);
                if (result == "granted") return showMessage("已取得權限", "success");
                if (result == "denied") return showMessage("使用者拒絕", "danger");
            });
        });

        function showMessage(msg, type = "info") {
            messageArea.innerHTML = `<div class="alert alert-${type}" role="alert">${msg}</div>`;
            setTimeout(() => {
                messageArea.innerHTML = "";
            }, 3000);
        }

        function sendNotification() {
            new Notification("通知測試", {
                body: "這是一則來自 Notification API 的通知",
                icon: "https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/icons/bell.svg"
            });

            showMessage("已發送通知", "primary");
        }
    </script>
</body>

</html>
