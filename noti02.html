<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Notification API</title>
</head>

<body>
    <div class="container py-5" style="max-width: 600px;">
        <h1 class="mb-4">Notification API 範例</h1>

        <div class="mb-4">
            <p>目前通知權限狀態：<span id="permissionStatus" class="badge bg-secondary"></span></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script>
        const permissionStatus = document.querySelector("#permissionStatus");
        const ws = new WebSocket("ws://localhost:8080");

        ws.addEventListener("message", async (event) => {
            const text = await event.data.text();
            sendNotification(text);
        })

        function sendNotification(msg) {
            new Notification("系統通知", {
                body: msg,
                icon: "https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/icons/bell.svg"
            });
        }
    </script>
</body>

</html>
